<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Platform</title>
    <link rel="stylesheet" href="style.css">
    
    <script defer src="scr_common.js"></script>
    <script src="chart.umd.min.js"></script>
    <script defer src="scr_dash.js"></script>
</head>
<body>
    <div class="TopBar">
        <div id="userPivot"></div>
    </div>
    <div class="ColumnDisplay">
        <div class="LeftColumn"></div>
        <div class="MiddleColumn">
            <div id="dataToolLine">
                <div id="dataToolLineLeft">
                    <button type="button" onclick="SetUpTable(0)" class="DataButton">1 time</button>
                    <button type="button" onclick="SetUpTable(1)" class="DataButton">6 timer</button>
                    <button type="button" onclick="SetUpTable(2)" class="DataButton">24 timer</button>
                    <button type="button" onclick="SetUpTable(3)" class="DataButton">3 dage</button>
                    <button type="button" onclick="SetUpTable(4)" class="DataButton">7 dage</button>
                    <button type="button" onclick="SetUpTable(5)" class="DataButton">30 dage</button>
                    <button type="button" onclick="TestFetch()" class="DataButton">Fetch</button>
                    <button type="button" onclick="TestTime()" class="DataButton">TestTime</button>
                </div>
                <div id="dataToolLineRight">
                    <input id="dateInput" name="dateInput" type="date"/>
                    <input id="timeInputHour" name="timeInputHour" type="text" max="23" min="0" size="2" maxlength="2"/>
                    <span>:</span>
                    <input id="timeInputMinute" name="timeInputMinute" type="text" max="59" min="0" size="2" maxlength="2"/>
                    <button type="button" onclick="NowPressed()">Nu</button>
                </div>
            </div>
            <div id="graphDiv" class="GraphContainer">
                <canvas id="graph" class="Graph"></canvas>
            </div>
            <div id="tableDiv" class="TableContainer"></div>
        </div>
        <div class="RightColumn"></div>
    </div>
    
</body>
